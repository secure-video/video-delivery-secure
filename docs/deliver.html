<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>動画閲覧ログイン</title>
  <style>
    body {
      font-family: "Noto Sans JP", sans-serif;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #0066cc; }
    input, button {
      padding: 10px;
      font-size: 1em;
      margin-top: 10px;
    }
    button {
      background-color: #0066cc;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #004c99; }
  </style>
</head>
<body>
  <h1>動画閲覧ログイン</h1>
  <p>パスワードを入力してください。</p>

  <input id="pw" type="password" placeholder="パスワード">
  <br>
  <button onclick="login()">ログイン</button>

  <script>
    const CORRECT_PASSWORD = "ここに嶺が決めたパスワード";

    function login() {
      const pw = document.getElementById("pw").value;
      if (pw === CORRECT_PASSWORD) {
        // ログイン成功 → index.html へ
        location.href = "index.html";
      } else {
        alert("パスワードが違います");
      }
    }
  </script>
</body>
</html>
