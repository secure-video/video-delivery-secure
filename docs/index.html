<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>参考動画一覧</title>
  <style>
    body {
      font-family: "Noto Sans JP", sans-serif;
      background-color: #f5f5f5;
      color: #333;
      text-align: center;
      padding: 40px;
    }
    h1 { color: #0066cc; }
    h2 { color: #004c99; margin-top: 40px; }
    video {
      border: 2px solid #0066cc;
      border-radius: 8px;
      margin-top: 10px;
    }
    a {
      color: #0066cc;
      font-weight: bold;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .message {
      margin-top: 30px;
      font-size: 1.05em;
    }
  </style>
  <!-- CryptoJS をローカルに置いて読み込む（crypto-js.js） -->
  <script src="crypto-js.js"></script>
  <!-- 暗号化済みパス一覧 -->
  <script src="encryptedPaths.js"></script>
</head>
<body>

  <script>
    // ログインしていない（鍵がない）場合は403へ
    const key = sessionStorage.getItem("videoKey");
    if (!key) {
      location.href = "403.html";
    }

    // 復号関数
    function decryptPath(cipherText) {
      const bytes = CryptoJS.AES.decrypt(cipherText, key);
      return bytes.toString(CryptoJS.enc.Utf8);
    }

    // 復号して video の src にセット
    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("gingasaiVideo").src =
        decryptPath(encryptedPaths.gingasai);

      document.getElementById("gintalkDay1Video").src =
        decryptPath(encryptedPaths.gintalk_day1);
      document.getElementById("gintalkDay2Video").src =
        decryptPath(encryptedPaths.gintalk_day2);
      document.getElementById("gintalkDay3Video").src =
        decryptPath(encryptedPaths.gintalk_day3);
      document.getElementById("gintalkDay4Video").src =
        decryptPath(encryptedPaths.gintalk_day4);

      document.getElementById("sansoukaiVideo").src =
        decryptPath(encryptedPaths.sansoukai);

      document.getElementById("others1Video").src =
        decryptPath(encryptedPaths.others1);
      document.getElementById("others2Video").src =
        decryptPath(encryptedPaths.others2);
    });
  </script>

  <h1>参考動画一覧</h1>

  <div class="message">
    <p>この動画は、私が中学時代に制作した作品の参考資料です。<br>
    当時の活動や表現の工夫を振り返りながら、今後の授業や部活動の参考にしていただければ幸いです。</p>
    <p>制作者：嶺（長野工業高校 情報工学科）</p>
  </div>

  <h2>銀河祭完成動画</h2>
  <video id="gingasaiVideo" controls width="640"></video>

  <h2>銀トーク動画（1日目〜4日目）</h2>
  <video id="gintalkDay1Video" controls width="640"></video><br><br>
  <video id="gintalkDay2Video" controls width="640"></video><br><br>
  <video id="gintalkDay3Video" controls width="640"></video><br><br>
  <video id="gintalkDay4Video" controls width="640"></video>

  <h2>三送会・三年生発表</h2>
  <video id="sansoukaiVideo" controls width="640"></video>

  <h2>もろもろ・その他</h2>
  <video id="others1Video" controls width="640"></video><br><br>
  <video id="others2Video" controls width="640"></video>

</body>
</html>
