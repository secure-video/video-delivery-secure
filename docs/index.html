<!DOCTYPE html>

    body {
      font-family: "Noto Sans JP", sans-serif;

    h1 { color: #0066cc; }
    h2 { color: #004c99; margin-top: 40px; }
    video {

    }
    a {

      font-weight: bold;

<body>

<script>
  // ★ ログインしていない場合は403へ
  if (sessionStorage.getItem("login") !== "ok") {
    location.href = "403.html";
  }

  // ★ mp4リンクを押した時のアクセス制御
  function checkAccess(path) {
    if (sessionStorage.getItem("login") === "ok") {
      // ログイン済み → 通常アクセス
      window.location.href = path;
    } else {
      // 未ログイン → 402ページへ強制移動
      const errorPage = path.replace(/\.mp4$/, "/402.html");
      window.location.href = errorPage;
    }
    return false; // 通常のリンク動作を止める
  }
</script>


<h1>参考動画一覧</h1>

<div class="message">
  <p>この動画は、私が中学時代に制作した作品の参考資料です。<br>
  当時の活動や表現の工夫を振り返りながら、今後の授業や部活動の参考にしていただければ幸いです。</p>
  <p>制作者：嶺（長野工業高校 情報工学科）</p>
</div>
